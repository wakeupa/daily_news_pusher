name: 每日早报推送
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '\''3.10'\''
      - run: pip install requests
      - run: python3 daily_news_pusher.py
